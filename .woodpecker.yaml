when:
  - event: [push, pull_request]


steps:
  # ── CI: tests (all branches, push + PR) ──
  - name: test
    image: ghcr.io/astral-sh/uv:python3.13-alpine
    commands:
      - cd service
      - uv sync --extra dev
      - SCHEMA_PATH=$PWD/schema.sql MODEL_PATH=$PWD/model.conf uv run pytest -v
    when:
      event: [push, pull_request]

  # ── CD: build + push (main only) ──
  - name: build-and-push
    image: moby/buildkit:v0.21.1
    commands:
      - |
        buildctl --addr tcp://buildkitd.infra.svc.cluster.local:1234 \
          build \
          --frontend dockerfile.v0 \
          --local context=service \
          --local dockerfile=service \
          --opt build-arg:AUTH_YAML_CONTENT="$AUTH_YAML_CONTENT" \
          --output type=image,name=registry.infra.svc.cluster.local:5000/cassandra-auth:latest,push=true,registry.insecure=true
    environment:
      AUTH_YAML_CONTENT:
        from_secret: auth_yaml
    when:
      branch: main
      event: push

  - name: notify-success
    image: alpine/curl
    when:
      - status: success
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - >
        curl -sf -H "Content-Type: application/json"
        -d "{\"embeds\":[{\"title\":\"✅ $CI_REPO #$CI_PIPELINE_NUMBER\",\"description\":\"**Branch:** $CI_COMMIT_BRANCH\n**Commit:** \`$(echo $CI_COMMIT_SHA | cut -c1-7)\`\",\"color\":3066993,\"url\":\"$CI_PIPELINE_URL\"}]}"
        "$DISCORD_WEBHOOK_URL"

  - name: notify-failure
    image: alpine/curl
    when:
      - status: failure
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - >
        curl -sf -H "Content-Type: application/json"
        -d "{\"embeds\":[{\"title\":\"❌ $CI_REPO #$CI_PIPELINE_NUMBER\",\"description\":\"**Branch:** $CI_COMMIT_BRANCH\n**Commit:** \`$(echo $CI_COMMIT_SHA | cut -c1-7)\`\",\"color\":15158332,\"url\":\"$CI_PIPELINE_URL\"}]}"
        "$DISCORD_WEBHOOK_URL"
